<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .tabs {
            display: flex;
            border-bottom: 2px solid #eee;
            margin-bottom: 25px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: none;
            border: none;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            position: relative;
        }
        .tab.active {
            color: #667eea;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #667eea;
        }
        .form {
            display: none;
        }
        .form.active {
            display: block;
        }
        .field {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 14px;
            color: #333;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            background: #5568d3;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }
        .alert.show {
            display: block;
        }
        .alert.success {
            background: #d1fae5;
            color: #065f46;
        }
        .alert.error {
            background: #fee2e2;
            color: #991b1b;
        }
        .hidden {
            display: none !important;
        }
        .main-app {
            display: none;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .main-app.active {
            display: block;
        }
        .navbar {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .nav-brand {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }
        .btn-logout {
            padding: 8px 20px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f9f9f9;
            font-weight: 600;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <a href="index.html" class="back-btn">← Back</a>
            <h1>👨‍🎓 Student Portal</h1>
            <p class="subtitle">Advanced Python Programming</p>
            
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Login</button>
                <button class="tab" onclick="switchTab('register')">Register</button>
            </div>
            
            <div id="alert" class="alert"></div>
            
            <form id="loginForm" class="form active" onsubmit="handleLogin(event)">
                <div class="field">
                    <label>Email / Username</label>
                    <input type="text" name="email" required placeholder="Your email or username">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            
            <form id="registerForm" class="form" onsubmit="handleRegister(event)">
                <div class="field">
                    <label>Full Name</label>
                    <input type="text" name="name" required>
                </div>
                <div class="field">
                    <label>Email / Username</label>
                    <input type="text" name="email" required>
                </div>
                <div class="field">
                    <label>Roll Number</label>
                    <input type="text" name="roll_no" required placeholder="e.g., 1BM23IS001">
                </div>
                <div class="field">
                    <label>Department</label>
                    <select name="department" required>
                        <option value="ISE">ISE</option>
                        <option value="CSE">CSE</option>
                    </select>
                </div>
                <div class="field">
                    <label>Semester</label>
                    <select name="semester" required>
                        <option value="5">5</option>
                        <option value="3">3</option>
                        <option value="7">7</option>
                    </select>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <div class="field">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" required>
                </div>
                <button type="submit" class="btn">Register</button>
            </form>
        </div>
    </div>
    
    <div id="mainApp" class="main-app">
        <nav class="navbar">
            <div class="nav-brand">Student Dashboard</div>
            <div>
                <span id="userName" style="margin-right:20px;font-weight:600;"></span>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </nav>
        
        <div class="container">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="attendancePercent">0%</div>
                    <div class="stat-label">Attendance</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgMarks">0%</div>
                    <div class="stat-label">Average Performance</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalClasses">0</div>
                    <div class="stat-label">Total Classes</div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">My Attendance</div>
                <div id="attendanceDetails"></div>
            </div>
            
            <div class="card">
                <div class="card-title">My Performance</div>
                <div id="performanceDetails"></div>
            </div>
        </div>
    </div>
    
    <script>
        const API = 'http://localhost:5000/api';
        let currentUser = null;
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + 'Form').classList.add('active');
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            
            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'include',
                    body: JSON.stringify({
                        email: form.email.value,
                        password: form.password.value
                    })
                });
                
                const data = await res.json();
                if (res.ok && data.user.role === 'student') {
                    currentUser = data.user;
                    showAlert('✓ Login successful!', 'success');
                    setTimeout(() => showDashboard(), 800);
                } else {
                    showAlert(data.error || 'Invalid credentials', 'error');
                }
            } catch(e) {
                showAlert('Server error', 'error');
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            const form = e.target;
            
            if (form.password.value !== form.confirm_password.value) {
                showAlert('Passwords do not match', 'error');
                return;
            }
            
            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: form.name.value,
                        email: form.email.value,
                        roll_no: form.roll_no.value,
                        department: form.department.value,
                        semester: parseInt(form.semester.value),
                        password: form.password.value,
                        role: 'student'
                    })
                });
                
                const data = await res.json();
                if (res.ok) {
                    showAlert('✓ Registration successful! Please login.', 'success');
                    setTimeout(() => switchTab('login'), 1500);
                } else {
                    showAlert(data.error, 'error');
                }
            } catch(e) {
                showAlert('Server error', 'error');
            }
        }
        
        async function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').classList.add('active');
            document.getElementById('userName').textContent = currentUser.name;
            await loadDashboard();
        }
        
        async function loadDashboard() {
            try {
                const res = await fetch(`${API}/dashboard/student/${currentUser.student_id}`, {
                    credentials: 'include'
                });
                const data = await res.json();
                
                document.getElementById('attendancePercent').textContent = 
                    data.attendance.summary.attendance_percentage.toFixed(1) + '%';
                document.getElementById('avgMarks').textContent = 
                    (data.performance.summary.average_percentage || 0).toFixed(1) + '%';
                document.getElementById('totalClasses').textContent = 
                    data.attendance.summary.total_classes;
                
                const attDiv = document.getElementById('attendanceDetails');
                if (data.attendance.records.length > 0) {
                    attDiv.innerHTML = '<table><thead><tr><th>Subject</th><th>Date</th><th>Status</th></tr></thead><tbody>';
                    data.attendance.records.forEach(r => {
                        attDiv.innerHTML += `<tr><td>${r.subject_name}</td><td>${r.date}</td><td>${r.status}</td></tr>`;
                    });
                    attDiv.innerHTML += '</tbody></table>';
                } else {
                    attDiv.innerHTML = '<p class="empty-state">No attendance records</p>';
                }
                
                const perfDiv = document.getElementById('performanceDetails');
                if (data.performance.records.length > 0) {
                    perfDiv.innerHTML = '<table><thead><tr><th>Subject</th><th>Assessment</th><th>Marks</th><th>%</th><th>Date</th></tr></thead><tbody>';
                    data.performance.records.forEach(r => {
                        const pct = ((r.marks_obtained / r.total_marks) * 100).toFixed(1);
                        perfDiv.innerHTML += `<tr><td>${r.subject_name}</td><td>${r.assessment_type}</td><td>${r.marks_obtained}/${r.total_marks}</td><td>${pct}%</td><td>${r.date}</td></tr>`;
                    });
                    perfDiv.innerHTML += '</tbody></table>';
                } else {
                    perfDiv.innerHTML = '<p class="empty-state">No performance records</p>';
                }
            } catch(e) {
                console.error(e);
            }
        }
        
        function logout() {
            if (confirm('Logout?')) location.reload();
        }
        
        function showAlert(msg, type) {
            const alert = document.getElementById('alert');
            alert.textContent = msg;
            alert.className = `alert show ${type}`;
            setTimeout(() => alert.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
