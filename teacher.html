<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
        }
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .tabs {
            display: flex;
            border-bottom: 2px solid #eee;
            margin-bottom: 25px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: none;
            border: none;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            position: relative;
        }
        .tab.active {
            color: #f5576c;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #f5576c;
        }
        .form {
            display: none;
        }
        .form.active {
            display: block;
        }
        .field {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 14px;
            color: #333;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #f5576c;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #f5576c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            background: #e04658;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }
        .alert.show {
            display: block;
        }
        .alert.success {
            background: #d1fae5;
            color: #065f46;
        }
        .alert.error {
            background: #fee2e2;
            color: #991b1b;
        }
        .hidden {
            display: none !important;
        }
        .main-app {
            display: none;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .main-app.active {
            display: block;
        }
        .navbar {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .nav-brand {
            font-size: 20px;
            font-weight: 700;
            color: #f5576c;
        }
        .btn-logout {
            padding: 8px 20px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #f5576c;
        }
        .stat-label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f9f9f9;
            font-weight: 600;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #f5576c;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .btn-success {
            padding: 10px 20px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 10px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .checkbox-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .checkbox-item {
            padding: 8px;
            margin: 5px 0;
        }
        .checkbox-item input {
            width: auto;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <a href="index.html" class="back-btn">← Back</a>
            <h1>👨‍🏫 Teacher Portal</h1>
            <p class="subtitle">Advanced Python Programming</p>
            
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Login</button>
                <button class="tab" onclick="switchTab('register')">Register</button>
            </div>
            
            <div id="alert" class="alert"></div>
            
            <form id="loginForm" class="form active" onsubmit="handleLogin(event)">
                <div class="field">
                    <label>Email / Username</label>
                    <input type="text" name="email" required>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            
            <form id="registerForm" class="form" onsubmit="handleRegister(event)">
                <div class="field">
                    <label>Full Name</label>
                    <input type="text" name="name" required>
                </div>
                <div class="field">
                    <label>Email / Username</label>
                    <input type="text" name="email" required>
                </div>
                <div class="field">
                    <label>Department</label>
                    <select name="department" required>
                        <option value="ISE">ISE</option>
                        <option value="CSE">CSE</option>
                    </select>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <div class="field">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" required>
                </div>
                <button type="submit" class="btn">Register</button>
            </form>
        </div>
    </div>
    
    <div id="mainApp" class="main-app">
        <nav class="navbar">
            <div class="nav-brand">Teacher Dashboard</div>
            <div>
                <span id="userName" style="margin-right:20px;font-weight:600;"></span>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </nav>
        
        <div class="container">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalStudents">0</div>
                    <div class="stat-label">Registered Students</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">1</div>
                    <div class="stat-label">Course</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">ISE</div>
                    <div class="stat-label">Department</div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">Quick Actions</div>
                <button class="btn-success" onclick="openMarkAttendance()">📝 Mark Attendance</button>
                <button class="btn-success" onclick="openAddMarks()">📊 Add Marks</button>
            </div>
            
            <div class="card">
                <div class="card-title">Registered Students</div>
                <table>
                    <thead>
                        <tr>
                            <th>Roll No</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Semester</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTable"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Mark Attendance Modal -->
    <div id="markAttendanceModal" class="modal">
        <div class="modal-content">
            <h3>Mark Attendance</h3>
            <form id="attendanceForm" onsubmit="submitAttendance(event)">
                <div class="field">
                    <label>Subject</label>
                    <select name="subject" required id="subjectSelect">
                        <option value="">Select Subject</option>
                    </select>
                </div>
                <div class="field">
                    <label>Date</label>
                    <input type="date" name="date" required>
                </div>
                <div class="field">
                    <label>Select Present Students</label>
                    <div class="checkbox-list" id="studentCheckboxes"></div>
                </div>
                <button type="submit" class="btn-success">Mark Attendance</button>
                <button type="button" class="btn" onclick="closeModal('markAttendanceModal')" style="background:#999;margin-top:10px;">Cancel</button>
            </form>
        </div>
    </div>
    
    <!-- Add Marks Modal -->
    <div id="addMarksModal" class="modal">
        <div class="modal-content">
            <h3>Add Marks</h3>
            <form id="marksForm" onsubmit="submitMarks(event)">
                <div class="field">
                    <label>Student</label>
                    <select name="student" required id="marksStudentSelect"></select>
                </div>
                <div class="field">
                    <label>Subject</label>
                    <select name="subject" required id="marksSubjectSelect"></select>
                </div>
                <div class="field">
                    <label>Assessment Type</label>
                    <select name="type" required>
                        <option value="Quiz">Quiz</option>
                        <option value="Assignment">Assignment</option>
                        <option value="Cycle1">Cycle 1</option>
                        <option value="Cycle2">Cycle 2</option>
                        <option value="Project">Project</option>
                        <option value="CIE">CIE</option>
                        <option value="SEE">SEE</option>
                    </select>
                </div>
                <div class="field">
                    <label>Marks Obtained</label>
                    <input type="number" name="obtained" step="0.01" required>
                </div>
                <div class="field">
                    <label>Total Marks</label>
                    <input type="number" name="total" step="0.01" required>
                </div>
                <div class="field">
                    <label>Date</label>
                    <input type="date" name="date" required>
                </div>
                <button type="submit" class="btn-success">Add Marks</button>
                <button type="button" class="btn" onclick="closeModal('addMarksModal')" style="background:#999;margin-top:10px;">Cancel</button>
            </form>
        </div>
    </div>
    
    <script>
        const API = 'http://localhost:5000/api';
        let currentUser = null;
        let allStudents = [];
        let allSubjects = [];
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + 'Form').classList.add('active');
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            
            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'include',
                    body: JSON.stringify({
                        email: form.email.value,
                        password: form.password.value
                    })
                });
                
                const data = await res.json();
                if (res.ok && data.user.role === 'teacher') {
                    currentUser = data.user;
                    showAlert('✓ Login successful!', 'success');
                    setTimeout(() => showDashboard(), 800);
                } else {
                    showAlert(data.error || 'Invalid credentials', 'error');
                }
            } catch(e) {
                showAlert('Server error', 'error');
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            const form = e.target;
            
            if (form.password.value !== form.confirm_password.value) {
                showAlert('Passwords do not match', 'error');
                return;
            }
            
            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: form.name.value,
                        email: form.email.value,
                        department: form.department.value,
                        password: form.password.value,
                        role: 'teacher'
                    })
                });
                
                const data = await res.json();
                if (res.ok) {
                    showAlert('✓ Registration successful! Please login.', 'success');
                    setTimeout(() => switchTab('login'), 1500);
                } else {
                    showAlert(data.error, 'error');
                }
            } catch(e) {
                showAlert('Server error', 'error');
            }
        }
        
        async function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').classList.add('active');
            document.getElementById('userName').textContent = currentUser.name;
            await loadStudents();
            await loadSubjects();
        }
        
        async function loadStudents() {
            try {
                const res = await fetch(`${API}/students`, {credentials: 'include'});
                const students = await res.json();
                allStudents = students;
                
                const tbody = document.getElementById('studentsTable');
                tbody.innerHTML = '';
                
                document.getElementById('totalStudents').textContent = students.length;
                
                if (students.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No students registered yet</td></tr>';
                    return;
                }
                
                students.forEach(s => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${s.roll_no}</td>
                            <td>${s.name}</td>
                            <td>${s.email}</td>
                            <td>${s.department}</td>
                            <td>Semester ${s.semester}</td>
                        </tr>
                    `;
                });
            } catch(e) {
                console.error(e);
            }
        }
        
        async function loadSubjects() {
            try {
                const res = await fetch(`${API}/subjects`, {credentials: 'include'});
                allSubjects = await res.json();
                
                const select1 = document.getElementById('subjectSelect');
                const select2 = document.getElementById('marksSubjectSelect');
                
                allSubjects.forEach(s => {
                    select1.innerHTML += `<option value="${s.subject_id}">${s.subject_name}</option>`;
                    select2.innerHTML += `<option value="${s.subject_id}">${s.subject_name}</option>`;
                });
            } catch(e) {
                console.error(e);
            }
        }
        
        function openMarkAttendance() {
            if (allStudents.length === 0) {
                alert('No students registered yet!');
                return;
            }
            document.getElementById('markAttendanceModal').classList.add('active');
            const list = document.getElementById('studentCheckboxes');
            list.innerHTML = '';
            allStudents.forEach(s => {
                list.innerHTML += `<div class="checkbox-item"><input type="checkbox" name="students" value="${s.student_id}" checked> ${s.name} (${s.roll_no})</div>`;
            });
        }
        
        async function submitAttendance(e) {
            e.preventDefault();
            const form = e.target;
            const students = Array.from(form.querySelectorAll('input[name="students"]:checked')).map(cb => parseInt(cb.value));
            
            if (students.length === 0) {
                alert('Please select at least one student');
                return;
            }
            
            try {
                const res = await fetch(`${API}/attendance/mark`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'include',
                    body: JSON.stringify({
                        student_ids: students,
                        subject_id: parseInt(form.subject.value),
                        date: form.date.value,
                        status: 'Present'
                    })
                });
                
                if (res.ok) {
                    alert('✓ Attendance marked!');
                    closeModal('markAttendanceModal');
                    form.reset();
                }
            } catch(e) {
                alert('Error: ' + e.message);
            }
        }
        
        function openAddMarks() {
            if (allStudents.length === 0) {
                alert('No students registered yet!');
                return;
            }
            document.getElementById('addMarksModal').classList.add('active');
            const select = document.getElementById('marksStudentSelect');
            select.innerHTML = '<option value="">Select Student</option>';
            allStudents.forEach(s => {
                select.innerHTML += `<option value="${s.student_id}">${s.name} (${s.roll_no})</option>`;
            });
        }
        
        async function submitMarks(e) {
            e.preventDefault();
            const form = e.target;
            
            try {
                const res = await fetch(`${API}/performance/add`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'include',
                    body: JSON.stringify({
                        student_id: parseInt(form.student.value),
                        subject_id: parseInt(form.subject.value),
                        assessment_type: form.type.value,
                        marks_obtained: parseFloat(form.obtained.value),
                        total_marks: parseFloat(form.total.value),
                        date: form.date.value
                    })
                });
                
                if (res.ok) {
                    alert('✓ Marks added!');
                    closeModal('addMarksModal');
                    form.reset();
                }
            } catch(e) {
                alert('Error: ' + e.message);
            }
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        
        function logout() {
            if (confirm('Logout?')) location.reload();
        }
        
        function showAlert(msg, type) {
            const alert = document.getElementById('alert');
            alert.textContent = msg;
            alert.className = `alert show ${type}`;
            setTimeout(() => alert.classList.remove('show'), 3000);
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.querySelectorAll('input[type="date"]').forEach(input => {
                input.value = today;
            });
        });
    </script>
</body>
</html>
